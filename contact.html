<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Contact | Alexander Cabral</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body class="bg-page">

<!-- HEADER -->
<header class="text-center py-4">
  <h1 class="site-title">ALEXANDER CABRAL</h1>
  <p class="site-subtitle">VIDEOMAKER · PHOTOGRAPHER · DESIGNER</p>

  <nav class="menu-pill mt-3">
    <a href="index.html">HOME</a>
    <a href="film.html">FILM</a>
    <a href="design.html">DESIGN</a>
    <a href="photograph.html">PHOTOGRAPH</a>
    <a href="about.html">ABOUT</a>
    <a href="contact.html" class="active">CONTACT</a>
  </nav>
</header>

<!-- CONTEÚDO -->
<main class="container py-5">

  <h3 class="text-center mb-5">DISPONÍVEL PARA NOVOS PROJETOS</h3>

  <!-- FORMULÁRIO FUNCIONAL -->
  <form 
    class="row g-3 mx-auto" 
    style="max-width: 720px;"
    action="https://formspree.io/f/mojevyjv"
    method="POST"
  >

    <div class="col-md-6">
      <input 
        type="text" 
        name="first_name"
        class="form-control" 
        placeholder="Primeiro Nome" 
        required>
    </div>

    <div class="col-md-6">
      <input 
        type="text" 
        name="last_name"
        class="form-control" 
        placeholder="Segundo Nome" 
        required>
    </div>

    <div class="col-12">
      <input 
        type="email" 
        name="email"
        class="form-control" 
        placeholder="Email" 
        required>
    </div>

    <div class="col-12">
      <input 
        type="text" 
        name="subject"
        class="form-control" 
        placeholder="Assunto">
    </div>

    <div class="col-12">
      <textarea 
        class="form-control" 
        name="message"
        rows="5" 
        placeholder="Mensagem"
        required></textarea>
    </div>

    <!-- Proteção básica contra spam -->
    <input type="hidden" name="_captcha" value="false">

    <!-- Mensagem de sucesso -->
    <input type="hidden" name="_next" value="thankyou.html">

    <div class="col-12 text-center">
      <button type="submit" class="btn btn-dark px-5">
        SUBMETER
      </button>
    </div>

  </form>

</main>

</body>
</html>
